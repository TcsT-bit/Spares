<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparesHub OMEGA DMS v5.0</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#0a0a0a;--card:#111827;--accent:#2563eb;--green:#16a34a;--gold:#fbbf24;--purple:#7c3aed;--red:#dc2626}
[data-theme="light"]{--bg:#f1f5f9;--card:#fff;color:#0a0a0a}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:#f1f5f9}
.header{background:linear-gradient(135deg,#7c3aed,#ec4899);padding:18px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px}
.icon-btn{background:#1f2937;border:none;border-radius:10px;padding:10px;cursor:pointer;color:white}
.container{max-width:1600px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin:20px 0;overflow-x:auto}
.tab{flex:1;min-width:140px;padding:14px;text-align:center;background:#1f2937;border-radius:12px;cursor:pointer;font-weight:700;font-size:13px}
.tab.active{background:linear-gradient(135deg,var(--purple),var(--accent))}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{background:var(--card);border-radius:16px;padding:14px;border:1px solid #1f2937}
.badge{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;margin-right:4px}
.badge-quote{background:#fbbf24;color:#000}
.badge-work{background:#3b82f6;color:#fff}
.badge-paid{background:#16a34a;color:#fff}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;margin-top:8px;font-size:14px}
.btn-purple{background:var(--purple);color:white}
.btn-green{background:var(--green);color:white}
.btn-cyan{background:#06b6d4;color:white}
.btn-red{background:var(--red);color:white}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999}
.modal.active{display:flex}
.modal-card{background:var(--card);padding:24px;border-radius:18px;max-width:800px;width:90%;max-height:90vh;overflow-y:auto}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid #374151;background:#0a0a0a;color:#f1f5f9;margin-bottom:10px}
.vin-info{background:#1e293b;padding:12px;border-radius:10px;margin:10px 0;font-size:13px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto}
.kanban-col{background:#1f2937;border-radius:12px;padding:12px;min-width:250px}
.kanban-title{font-weight:800;margin-bottom:10px;text-align:center}
.job-card{background:#111827;padding:10px;border-radius:8px;margin-bottom:8px;border-left:4px solid var(--purple)}
.dvi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dvi-box{border:2px dashed #374151;border-radius:8px;padding:20px;text-align:center;cursor:pointer;background:#0f172a}
.dvi-box img{width:100%;border-radius:6px}
.notification{position:fixed;top:20px;right:20px;background:var(--green);color:white;padding:16px;border-radius:12px;z-index:9999;display:none}
@media(max-width:900px){.kanban{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ SparesHub OMEGA DMS v5.0</h1>
  <div><button class="icon-btn" onclick="toggleTheme()">🌓</button><button class="icon-btn" onclick="exportData()">📊</button><button class="icon-btn" onclick="showAdmin()">👤</button></div>
</div>

<div class="notification" id="notification"></div>

<div class="container">

<div id="browseScreen">
  <div class="tabs">
    <div class="tab active" onclick="showTab('browse')">Marketplace</div>
    <div class="tab" onclick="showTab('jobcards')">Job Cards</div>
    <div class="tab" onclick="showTab('dvi')">DVI</div>
    <div class="tab" onclick="showTab('tech')">Technicians</div>
    <div class="tab" onclick="showTab('reports')">Reports</div>
  </div>

  <!-- MARKETPLACE -->
  <div id="tab-browse">
    <button class="btn btn-purple" onclick="openSellModal()">+ NEW JOB / SELL PART</button>
    <div id="listingsGrid" class="grid" style="margin-top:20px"></div>
  </div>

  <!-- JOB CARD KANBAN -->
  <div id="tab-jobcards" class="hidden">
    <div class="kanban">
      <div class="kanban-col"><div class="kanban-title">📝 QUOTE</div><div id="col-quote"></div></div>
      <div class="kanban-col"><div class="kanban-title">🔧 IN WORK</div><div id="col-work"></div></div>
      <div class="kanban-col"><div class="kanban-title">⏳ WAITING PARTS</div><div id="col-wait"></div></div>
      <div class="kanban-col"><div class="kanban-title">✅ READY</div><div id="col-ready"></div></div>
      <div class="kanban-col"><div class="kanban-title">💰 PAID</div><div id="col-paid"></div></div>
    </div>
  </div>

  <!-- DVI -->
  <div id="tab-dvi" class="hidden">
    <h3>Digital Vehicle Inspection</h3>
    <input id="dviVin" placeholder="Enter VIN to start inspection">
    <button class="btn btn-purple" onclick="startDVI()">Start DVI</button>
    <div id="dviArea" class="hidden">
      <h4 id="dviCarTitle"></h4>
      <div class="dvi-grid">
        <div class="dvi-box" onclick="uploadDVI(this,'front')">📸 Front<br><span>Click to upload</span></div>
        <div class="dvi-box" onclick="uploadDVI(this,'side')">📸 Side<br><span>Click to upload</span></div>
        <div class="dvi-box" onclick="uploadDVI(this,'rear')">📸 Rear<br><span>Click to upload</span></div>
      </div>
      <textarea id="dviNotes" placeholder="Technician Notes: Tyres 50%, Brakes worn..."></textarea>
      <button class="btn btn-green" onclick="sendDVI()">Send DVI to Customer via WhatsApp</button>
    </div>
  </div>

  <!-- TECH BOARD -->
  <div id="tab-tech" class="hidden">
    <h3>Technician Board</h3>
    <div class="row">
      <select id="techSelect"><option>John - R350/hr</option><option>Mike - R300/hr</option></select>
      <input id="labourHours" type="number" placeholder="Hours: 2.5">
    </div>
    <button class="btn btn-cyan" onclick="addLabour()">Add Labour to Quote</button>
    <div id="techBoard"></div>
  </div>

  <!-- REPORTS -->
  <div id="tab-reports" class="hidden">
    <h3>Accounting Export</h3>
    <button class="btn btn-green" onclick="exportCSV()">Export Invoices CSV for Sage/Xero</button>
    <div id="reportStats"></div>
  </div>

</div>

</div>

<!-- SELL/JOB MODAL -->
<div id="sellModal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h2>NEW JOB CARD - VIN LEVEL</h2>
    <div class="row">
      <input id="vinInput" placeholder="17-Digit VIN" maxlength="17" oninput="decodeVIN()">
      <button class="btn btn-purple" onclick="decodeVIN()">🔍 Decode</button>
    </div>
    <div id="vinResult" class="vin-info hidden"></div>
    <input id="custName" placeholder="Customer Name">
    <input id="custWA" placeholder="Customer WhatsApp +27">
    <input id="vehicleMake" placeholder="Auto-filled" readonly>
    <input id="vehiclePCD" placeholder="PCD" readonly>
    <textarea id="jobDesc" placeholder="Job Description"></textarea>
    <div class="row">
      <input id="partsPrice" placeholder="Parts R">
      <input id="labourPrice" placeholder="Labour R">
    </div>
    <button class="btn btn-purple" onclick="createJobCard()">Create Job Card + Quote</button>
    <button class="btn" style="background:#4b5563" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
const firebaseConfig = {apiKey:"YOUR_API_KEY",authDomain:"YOUR.firebaseapp.com",projectId:"YOUR_ID",storageBucket:"YOUR.appspot.com",messagingSenderId:"XXX",appId:"YOUR_APP"};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allJobs = [], currentVINData=null, currentDVI={};

function showNotification(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',3000);}
function toggleTheme(){let t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);}

function showTab(tab){document.querySelectorAll('[id^=tab-]').forEach(x=>x.classList.add('hidden'));document.getElementById('tab-'+tab).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');if(tab==='jobcards')renderKanban();if(tab==='reports')renderReports();}

// VIN DECODE TIER 0
async function decodeVIN(){
  let vin = document.getElementById('vinInput').value.trim().toUpperCase();
  if(vin.length!== 17) return;
  const vinDB = {'JTFHX22P5': {make:'Toyota Hilux', year:'2018', pcd:'6x139.7', bolt:'M12x1.5'}, '1FTFW1E5X': {make:'Ford Ranger', year:'2020', pcd:'6x139.7'}};
  let data = vinDB[vin.substring(0,9)] || {make:'Unknown', year:'N/A', pcd:'Check'};
  currentVINData = data;
  document.getElementById('vehicleMake').value = `${data.make} ${data.year}`;
  document.getElementById('vehiclePCD').value = data.pcd;
  document.getElementById('vinResult').innerHTML = `<b>✓ ${data.make} ${data.year}</b><br>PCD: ${data.pcd} | Bolt: ${data.bolt}`;
  document.getElementById('vinResult').classList.remove('hidden');
}

// JOB CARD SYSTEM
async function createJobCard(){
  let n=document.getElementById('custName').value.trim();
  let w=document.getElementById('custWA').value.trim();
  let m=document.getElementById('vehicleMake').value;
  let d=document.getElementById('jobDesc').value;
  let parts=parseFloat(document.getElementById('partsPrice').value)||0;
  let labour=parseFloat(document.getElementById('labourPrice').value)||0;
  let total=(parts+labour)*1.15;

  await db.collection('spareshub_jobs').add({
    customer:n,whatsapp:w,make:m,desc:d,parts,labour,total,status:'quote',vin:currentVINData,date:new Date().toISOString()
  });
  sendWhatsApp(w, `Hi ${n}, Quote ready: ${m} - R${total.toFixed(2)}. Reply APPROVE to start work.`);
  showNotification('Job Card Created + WhatsApp Sent');
  closeModal();
}

db.collection('spareshub_jobs').onSnapshot(snap=>{allJobs=snap.docs.map(d=>({id:d.id,...d.data()}));renderKanban();renderMarketplace();});

// KANBAN WORKFLOW
function renderKanban(){
  ['quote','work','wait','ready','paid'].forEach(s=>{
    let col = document.getElementById('col-'+s);
    let jobs = allJobs.filter(j=>j.status===s);
    col.innerHTML = jobs.map(j=>`
      <div class="job-card">
        <b>${j.make}</b><br>
        ${j.customer}<br>
        R${j.total?.toFixed(2)}<br>
        <button class="btn btn-cyan" style="padding:6px;margin-top:4px" onclick="moveJob('${j.id}','${nextStatus(s)}')">→ ${nextStatus(s).toUpperCase()}</button>
      </div>
    `).join('');
  });
}
function nextStatus(s){return {quote:'work',work:'wait',wait:'ready',ready:'paid'}[s]||'paid';}
async function moveJob(id,status){await db.collection('spareshub_jobs').doc(id).update({status});showNotification('Moved to '+status);}

// DVI SYSTEM
function startDVI(){
  let vin = document.getElementById('dviVin').value;
  let job = allJobs.find(j=>j.vin&&j.make.includes(vin.substring(0,3)));
  if(!job) return alert('Job not found');
  currentDVI.jobId = job.id;
  document.getElementById('dviCarTitle').textContent = job.make + ' - ' + job.customer;
  document.getElementById('dviArea').classList.remove('hidden');
}
function uploadDVI(el,side){let input=document.createElement('input');input.type='file';input.accept='image/*';input.onchange=e=>{let file=e.target.files[0];let url=URL.createObjectURL(file);el.innerHTML=`<img src="${url}"><br>${side}`;currentDVI[side]=url;};input.click();}
function sendDVI(){
  let job = allJobs.find(j=>j.id===currentDVI.jobId);
  let msg = `DVI for ${job.make}:\n${document.getElementById('dviNotes').value}\nPlease APPROVE repairs.`;
  sendWhatsApp(job.whatsapp, msg);
  showNotification('DVI Sent to Customer');
}

// TECHNICIAN + LABOUR
function addLabour(){
  let tech = document.getElementById('techSelect').value;
  let hours = parseFloat(document.getElementById('labourHours').value)||0;
  let rate = tech.includes('R350')?350:300;
  let cost = hours*rate;
  document.getElementById('techBoard').innerHTML += `<div>${tech} - ${hours}hrs = R${cost}</div>`;
  document.getElementById('labourPrice').value = cost;
}

// REPORTS + EXPORT
function renderReports(){
  let total = allJobs.filter(j=>j.status==='paid').reduce((a,b)=>a+b.total,0);
  document.getElementById('reportStats').innerHTML = `<div class="card">Total Revenue: R${total.toLocaleString()}<br>Jobs Completed: ${allJobs.filter(j=>j.status==='paid').length}</div>`;
}
function exportCSV(){
  let csv = 'Customer,Vehicle,Total,Status\n';
  allJobs.forEach(j=>{csv+=`${j.customer},${j.make},${j.total},${j.status}\n`;});
  let blob=new Blob([csv],{type:'text/csv'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download='SparesHub_Invoices.csv';a.click();
  showNotification('CSV Exported for Sage/Xero');
}

// WHATSAPP + PDF
function sendWhatsApp(num,msg){window.open(`https://wa.me/${num.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);}
function openSellModal(){document.getElementById('sellModal').classList.add('active');}
function closeModal(e){if(!e||e.target.id==='sellModal')document.getElementById('sellModal').classList.remove('active');}
function renderMarketplace(){document.getElementById('listingsGrid').innerHTML = allJobs.map(j=>`<div class="card"><span class="badge badge-${j.status}">${j.status.toUpperCase()}</span><b>${j.make}</b><br>${j.customer}<br>R${j.total?.toFixed(2)}<button class="btn btn-purple" onclick="openQuote('${j.id}')">📄 Quote</button></div>`).join('');}
function openQuote(id){let j=allJobs.find(x=>x.id===id);const doc=new jsPDF();doc.text('SparesHub INVOICE',20,20);doc.text(`${j.make} - R${j.total}`,20,30);doc.save(`Invoice-${j.customer}.pdf`);}
</script>
</body>
</html>
